<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Dispatch Engine — run 7af3c1</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="themes.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js"
          integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
          integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
          crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
          integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
          crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script src="data.js"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" src="modals.jsx"></script>
  <script type="text/babel" src="scenarios.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const U = window.DEUI;
    const S = window.DESCREENS;
    const M = window.DEMODALS;
    const SC = window.DESCEN;
    const { useTweaks, TweaksPanel, TweakSection } = window;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "crimson",
      "zoom": 0.7,
      "scenario": "empty"
    }/*EDITMODE-END*/;

    const ACTIVE_RUNS = [
      { id: "7af3c1", short: "7af3c1", repo: "octane-api",  plan: "plan-014", status: "running", elapsed: "00:47:23", workers: 10 },
      { id: "9c2e88", short: "9c2e88", repo: "ledger-svc",  plan: "plan-019", status: "waiting", elapsed: "00:12:04", workers: 6  },
      { id: "4b1d70", short: "4b1d70", repo: "auth-mesh",   plan: "plan-008", status: "running", elapsed: "01:33:10", workers: 4  },
    ];

    function App() {
      const [screen, setScreen] = useState("overview");
      const [pickedAgent, setPickedAgent] = useState(null);
      const [modal, setModal] = useState(null); // null | "tail" | "status" | "cancel" | "decision" | "capability" | "kbd"
      const [decisionId, setDecisionId] = useState(null);
      const [runSwitcherOpen, setRunSwitcherOpen] = useState(false);
      const [currentRunId, setCurrentRunId] = useState("7af3c1");
      const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const crumbAnchorRef = useRef(null);

      const scenario = t.scenario || "running";
      const isEmpty = scenario === "empty";

      useEffect(() => {
        if (t.theme && t.theme !== "default") {
          document.body.setAttribute("data-theme", t.theme);
        } else {
          document.body.removeAttribute("data-theme");
        }
      }, [t.theme]);

      useEffect(() => {
        const z = t.zoom != null ? t.zoom : 1;
        if (Math.abs(z - 1) < 0.001) {
          document.documentElement.style.removeProperty("--ui-zoom");
          document.body.classList.remove("ui-zoomed");
        } else {
          document.documentElement.style.setProperty("--ui-zoom", String(z));
          document.documentElement.style.setProperty("--ui-zoom-inv", String(1 / z));
          document.body.classList.add("ui-zoomed");
        }
      }, [t.zoom]);

      // keyboard shortcuts
      useEffect(() => {
        let chord = null;
        let chordTimer = null;
        function clearChord() {
          chord = null;
          if (chordTimer) clearTimeout(chordTimer);
        }
        function onKey(e) {
          if (modal) return; // modal handles its own
          const tgt = e.target;
          const isInput = tgt && (tgt.tagName === "INPUT" || tgt.tagName === "TEXTAREA");
          if (isInput) return;
          if (e.key === "?") { setModal("kbd"); return; }
          if (e.key === "Escape") { clearChord(); return; }
          if (e.key === "x") { setModal("cancel"); return; }
          if (e.key === "c") { setModal("tail"); return; }
          if (e.key === "s") { setModal("status"); return; }
          if (chord === "g") {
            const map = { o:"overview", a:"agents", p:"plan", d:"decisions", c:"capabilities", v:"validators", h:"history" };
            if (map[e.key]) setScreen(map[e.key]);
            clearChord();
            return;
          }
          if (e.key === "g") {
            chord = "g";
            chordTimer = setTimeout(clearChord, 900);
          }
        }
        document.addEventListener("keydown", onKey);
        return () => document.removeEventListener("keydown", onKey);
      }, [modal]);

      function pickAgent(id) {
        setPickedAgent(id);
        setScreen("agent");
      }

      const crumbs = (() => {
        const base = [
          { label: "wo1fsea/octane-api" },
          { label: <span ref={crumbAnchorRef}
                         className="crumb-runtag mono"
                         onClick={() => setRunSwitcherOpen(s => !s)}>
                     run {currentRunId} ▾
                   </span> },
        ];
        switch (screen) {
          case "overview":     return [...base, { label: "Overview" }];
          case "agents":       return [...base, { label: "Agents" }];
          case "plan":         return [...base, { label: "Plan & workstreams" }];
          case "decisions":    return [...base, { label: "Decisions" }];
          case "capabilities": return [...base, { label: "Capabilities" }];
          case "validators":   return [...base, { label: "Validators" }];
          case "alerts":       return [...base, { label: "Alerts" }];
          case "history":      return [...base, { label: "Run history" }];
          case "agent":        return [...base, { label: "Agents" }, { label: pickedAgent || "—", mono: true }];
          default: return base;
        }
      })();

      // ── Empty state path ────────────────────────────────
      if (isEmpty) {
        return (
          <>
          <div className="app empty-mode" data-screen-label="00 Empty">
            <U.Sidebar screen="overview" setScreen={() => {}} empty />
            <div className="main">
              <U.Topbar
                crumbs={[{ label: "wo1fsea/octane-api" }, { label: "no active run" }]}
                theme={t.theme}
                onThemeChange={(v) => setTweak("theme", v)}
                zoom={t.zoom}
                onZoomChange={(v) => setTweak("zoom", v)}
                scenario={scenario}
                onScenarioChange={(v) => setTweak("scenario", v)}
                onShow={setModal}
                onCancel={() => {}}
                empty
              />
              <div className="content-scroll">
                <SC.EmptyDashboard onStartRun={() => setTweak("scenario", "running")} />
              </div>
            </div>
          </div>
          <ScenarioControlsPanel scenario={scenario} setTweak={setTweak} />
          </>
        );
      }

      // ── Active run paths ────────────────────────────────
      return (
        <>
        <div className={"app scenario-" + scenario} data-screen-label={
          screen === "overview" ? "01 Overview"
          : screen === "agent" ? `Agent · ${pickedAgent}`
          : `${screen.charAt(0).toUpperCase()}${screen.slice(1)}`
        }>
          <U.Sidebar screen={screen} setScreen={setScreen} scenario={scenario} />
          <div className="main">
            <U.Topbar crumbs={crumbs}
                      theme={t.theme}
                      onThemeChange={(v) => setTweak("theme", v)}
                      zoom={t.zoom}
                      onZoomChange={(v) => setTweak("zoom", v)}
                      scenario={scenario}
                      onScenarioChange={(v) => setTweak("scenario", v)}
                      onShow={setModal}
                      onCancel={() => setModal("cancel")} />
            <SC.ScenarioOverlay
              scenario={scenario}
              onAction={(a) => {
                if (a === "review") setModal("capability");
                if (a === "decision") { setDecisionId("decision-014"); setModal("decision"); }
              }}
            />

            {screen === "overview" && (
              <>
                <div className="content-scroll">
                  <SC.ScenarioRunHeader scenario={scenario} />
                  <div style={{height:14}} />
                  <div className="grid col-2">
                    <U.WorkstreamList />
                    <div style={{display:"flex", flexDirection:"column", gap:14, minWidth:0}}>
                      <HeartbeatWrapper scenario={scenario} />
                      <DecisionsListWired onOpen={(id) => { setDecisionId(id); setModal("decision"); }} />
                      <U.AlertsList />
                    </div>
                  </div>
                  <div style={{height:14}} />
                  <U.AgentRoster onPick={pickAgent} />
                </div>
                <U.EventStream paused={scenario === "disconnected" || scenario === "coordinator-dead" || scenario === "completed" || scenario === "cancelled" || scenario === "failed"} />
              </>
            )}

            {screen === "agents" && (
              <>
                <div className="content-scroll">
                  <U.AgentRoster onPick={pickAgent} />
                </div>
                <U.EventStream paused={scenario === "disconnected" || scenario === "coordinator-dead" || scenario === "completed" || scenario === "cancelled" || scenario === "failed"} />
              </>
            )}

            {screen === "plan" && (
              <>
                <div className="content-scroll">
                  <div className="grid" style={{gridTemplateColumns:"360px 1fr"}}>
                    <SC.PlanTreeWithSearch />
                    <U.WorkstreamList />
                  </div>
                  <div style={{height:14}} />
                  <div style={{display:"grid", gridTemplateColumns:"1fr", height:380}}>
                    <S.CoordLogPanel />
                  </div>
                </div>
                <U.EventStream />
              </>
            )}

            {screen === "decisions" && (
              <>
                <div className="content-scroll">
                  <DecisionsListWired onOpen={(id) => { setDecisionId(id); setModal("decision"); }} />
                  <div style={{height:14}} />
                  <HeartbeatWrapper scenario={scenario} />
                </div>
                <U.EventStream />
              </>
            )}

            {screen === "capabilities" && (
              <>
                <div className="content-scroll">
                  <S.CapabilityTable onReview={() => setModal("capability")} />
                  <div style={{height:14}} />
                  <U.AlertsList />
                </div>
                <U.EventStream />
              </>
            )}

            {screen === "validators" && (
              <>
                <div className="content-scroll">
                  <S.ValidatorPanel />
                </div>
                <U.EventStream />
              </>
            )}

            {screen === "alerts" && (
              <>
                <div className="content-scroll">
                  <U.AlertsList />
                </div>
                <U.EventStream />
              </>
            )}

            {screen === "history" && (
              <>
                <div className="content-scroll">
                  <SC.RunHistoryCompare />
                </div>
                <U.EventStream />
              </>
            )}

            {screen === "agent" && (
              <>
                <div className="content-scroll">
                  <S.AgentDetail agentId={pickedAgent}
                                 onBack={() => setScreen("agents")}
                                 onGrant={() => setModal("capability")} />
                </div>
                <U.EventStream />
              </>
            )}
          </div>
        </div>

        {/* Run switcher popover */}
        {runSwitcherOpen && (
          <M.RunSwitcher
            runs={ACTIVE_RUNS}
            currentId={currentRunId}
            anchorRef={crumbAnchorRef}
            onPick={(id) => { setCurrentRunId(id); setRunSwitcherOpen(false); }}
            onClose={() => setRunSwitcherOpen(false)}
          />
        )}

        {/* Modals */}
        <U.CommandModal kind={modal === "tail" || modal === "status" ? modal : null} onClose={() => setModal(null)} />
        {modal === "cancel" && (
          <M.CancelRunModal
            onClose={() => setModal(null)}
            onConfirm={() => { setModal(null); setTweak("scenario", "cancelled"); }}
          />
        )}
        {modal === "decision" && (
          <M.DecisionModal
            decision={window.DE_DATA.DECISIONS.find(d => d.id === decisionId)}
            onClose={() => setModal(null)}
            onResolve={() => setModal(null)}
          />
        )}
        {modal === "capability" && (
          <M.CapabilityModal
            onClose={() => setModal(null)}
            onResolve={() => setModal(null)}
          />
        )}
        {modal === "kbd" && (
          <M.KeyboardHelpModal onClose={() => setModal(null)} />
        )}

        <ScenarioControlsPanel scenario={scenario} setTweak={setTweak} />
        </>
      );
    }

    function HeartbeatWrapper({ scenario }) {
      return <U.HeartbeatCard scenario={scenario} />;
    }

    // wired version of DecisionsList that opens modal on click
    function DecisionsListWired({ onOpen }) {
      return <U.DecisionsList onOpen={onOpen} />;
    }

    // dev panel: scenario picker + open-modal shortcuts. Lives in the
    // Tweaks panel so it's gated by the Tweaks toggle.
    function ScenarioControlsPanel({ scenario, setTweak }) {
      return (
        <TweaksPanel>
          <TweakSection label="Demo state" />
          <div style={{fontSize:11, color:"var(--fg-2)", padding:"4px 4px 8px", lineHeight:1.5}}>
            Switch the dashboard between run states for handoff review.
          </div>
          <div style={{display:"grid", gridTemplateColumns:"1fr", gap:4}}>
            {SC.SCENARIOS.map(s => (
              <label key={s.k}
                     className={"twk-scen-row" + (scenario === s.k ? " active" : "")}
                     onClick={() => setTweak("scenario", s.k)}>
                <span className="twk-scen-bullet" />
                <div className="twk-scen-meta">
                  <div className="twk-scen-name">{s.label}</div>
                  <div className="twk-scen-desc">{s.desc}</div>
                </div>
              </label>
            ))}
          </div>
        </TweaksPanel>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
